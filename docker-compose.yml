services:
  postgres:
    image: postgres:16-alpine
    container_name: ak-pathshala-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: akpathshala
      POSTGRES_PASSWORD: akpathshala
      POSTGRES_DB: akpathshala
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akpathshala -d akpathshala"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: ak-pathshala-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      ENV: development
      CORS_ORIGINS: http://localhost:3000
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    container_name: ak-pathshala-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      WATCHPACK_POLLING: "true"
    depends_on:
      - backend

volumes:
  postgres_data:
